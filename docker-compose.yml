name: youngwook-docker-app

services:
  my-express-app:
    image: youngwookcho/docker-app-image:1.0.0
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - NODE_VERSION=22.16.0
      tags:
        - youngwookcho/docker-app-image:1.0.0
        - youngwookcho/docker-app-image
    container_name: docker-app-container
    env_file:
      - .env
    environment:
      - PORT=3000
      - DATABASE_URL=${POSTGRES_DATABASE_URL}
    networks:
      - docker-app-network
    ports:
      - 4000:3000
    depends_on:
      my-mypostgres-db:
        condition: service_healthy
    restart: on-failure
  my-mypostgres-db:
    image: postgres:17.5
    container_name: mypostgres-db-container
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
    #로컬환경에서 5432가아닌 5433 사용중이라 컨테이너 포트 5434로 매핑
      - 5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - docker-app-network
    volumes:
      - docker-app-volume:/var/lib/postgresql/data

networks:
  docker-app-network:
    name: docker-app-network

volumes:
  docker-app-volume:
    name: docker-app-volume